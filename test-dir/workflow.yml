name: 构建 iOS IPA

on:
  workflow_dispatch:  # 手动触发，点一下按钮就构建

jobs:
  build:
    runs-on: macos-latest   # GitHub 免费提供的 macOS 云构建机
    timeout-minutes: 30

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 安装依赖
        run: npm install

      - name: 添加 iOS 平台
        run: npx cap add ios

      - name: 同步配置
        run: npx cap sync ios

      - name: 安装 CocoaPods
        run: cd ios/App && pod install

      - name: 构建 IPA（无签名，用于侧载）
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: 打包为 IPA
        run: |
          mkdir -p Payload
          cp -r ios/App/build/Build/Products/Release-iphoneos/App.app Payload/
          zip -r FurryChat-ios.ipa Payload/
          rm -rf Payload

      - name: 上传 IPA
        uses: actions/upload-artifact@v4
        with:
          name: 福瑞酒馆-iOS
          path: FurryChat-ios.ipa
